<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>液压系统知识答题程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        .quiz-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 400px;
            position: relative;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .question-number {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .score-display {
            display: flex;
            gap: 20px;
            font-size: 1rem;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-item span:first-child {
            color: rgba(255, 255, 255, 0.6);
        }

        .score-item span:last-child {
            font-weight: 600;
            color: #00d2ff;
        }

        .question-content {
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #fff;
            margin-bottom: 20px;
        }

        .question-text strong {
            color: #00d2ff;
        }

        .question-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-left: 10px;
            font-weight: 500;
        }

        .question-type.fill {
            background: rgba(0, 210, 255, 0.2);
            color: #00d2ff;
        }

        .question-type.choice {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .question-type.truefalse {
            background: rgba(255, 165, 0, 0.2);
            color: #ffa500;
        }

        .blanks {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .blank-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .blank-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .answer-input {
            width: 200px;
            padding: 12px 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .answer-input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .answer-input.correct {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .answer-input.incorrect {
            border-color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.2);
        }

        .answer-input:disabled {
            cursor: not-allowed;
        }

        .correct-answer {
            display: none;
            margin-top: 8px;
            font-size: 0.9rem;
            color: #00ff88;
            font-weight: 500;
        }

        .correct-answer.show {
            display: block;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option-item {
            padding: 18px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-item:hover {
            border-color: rgba(0, 210, 255, 0.5);
            background: rgba(0, 210, 255, 0.1);
            transform: translateX(5px);
        }

        .option-item.selected {
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        .option-item.correct {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .option-item.incorrect {
            border-color: #ff4757;
            background: rgba(255, 71, 87, 0.15);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.2);
        }

        .option-item:disabled {
            cursor: not-allowed;
        }

        .option-item:disabled:hover {
            transform: none;
        }

        .option-letter {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .option-item.selected .option-letter {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
        }

        .option-item.correct .option-letter {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
        }

        .option-item.incorrect .option-letter {
            background: linear-gradient(135deg, #ff4757, #c0392b);
        }

        .option-text {
            font-size: 1rem;
            line-height: 1.5;
        }

        .question-image {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background: white;
            padding: 15px;
        }
        
        .question-image img {
            max-width: 100%;
            height: auto;
        }
        
        .question-image svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        
        .option-image {
            max-width: 100px;
            max-height: 100px;
            width: auto;
            height: auto;
            margin: 10px 0;
            border-radius: 8px;
            object-fit: contain;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: white;
            padding: 10px;
        }
        
        .option-image img {
            max-width: 100%;
            height: auto;
        }
        
        .option-image svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .question-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .result-modal.show {
            display: flex;
        }

        .result-card {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(22, 33, 62, 0.95));
            border-radius: 30px;
            padding: 50px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
        }

        .result-icon.excellent {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
        }

        .result-icon.good {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #fff;
        }

        .result-icon.pass {
            background: linear-gradient(135deg, #ffa502, #ff6348);
            color: #fff;
        }

        .result-icon.fail {
            background: linear-gradient(135deg, #ff4757, #c0392b);
            color: #fff;
        }

        .result-title {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-score {
            font-size: 4rem;
            font-weight: 700;
            color: #00d2ff;
            margin: 20px 0;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-value.correct {
            color: #00ff88;
        }

        .stat-value.incorrect {
            color: #ff4757;
        }

        .stat-value.skipped {
            color: #ffa502;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .shuffle-toggle {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 20px;
            gap: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .question-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .question-num {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .question-num.current {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .question-num.completed {
            background: #00ff88;
            color: #1a1a2e;
        }

        .question-num.pending {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
        }

        .question-num.pending:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .quiz-area {
                padding: 20px;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .answer-input {
                width: 100%;
            }

            .blanks {
                flex-direction: column;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .btn {
                padding: 12px 24px;
                font-size: 1rem;
            }

            .result-card {
                padding: 30px 20px;
            }

            .result-title {
                font-size: 1.8rem;
            }

            .result-score {
                font-size: 3rem;
            }

            .result-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>液压系统知识答题</h1>
            <p>测试你的液压系统基础知识</p>
        </header>

        <div class="quiz-area">
            <div class="shuffle-toggle">
                <label class="toggle-switch">
                    <input type="checkbox" id="shuffleMode" onchange="toggleShuffleMode()">
                    <span class="slider"></span>
                </label>
                <span>打乱顺序模式</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="question-header">
                <div class="question-number" id="questionNumber">题目 1</div>
                <div class="score-display">
                    <div class="score-item">
                        <span>得分:</span>
                        <span id="currentScore">0</span>
                    </div>
                    <div class="score-item">
                        <span>进度:</span>
                        <span id="progressText">1/58</span>
                    </div>
                </div>
            </div>

            <div class="question-content" id="questionContent"></div>

            <div class="question-nav">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">上一题</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
            </div>

            <div class="question-grid" id="questionGrid"></div>
        </div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-card">
            <div class="result-icon" id="resultIcon"></div>
            <h2 class="result-title" id="resultTitle">答题完成</h2>
            <div class="result-score" id="finalScore">0</div>
            <div class="result-stats">
                <div class="stat-item">
                    <div class="stat-value correct" id="correctCount">0</div>
                    <div class="stat-label">正确</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value incorrect" id="incorrectCount">0</div>
                    <div class="stat-label">错误</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value skipped" id="skippedCount">0</div>
                    <div class="stat-label">未答</div>
                </div>
            </div>
            <button class="btn btn-success" onclick="restartQuiz()">重新答题</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                type: 'fill',
                text: '液压系统由（ ）、（ ）、（ ）、（ ）四个主要组成部分。系统压力的大小由（ ）决定。',
                answers: ['辅助元件', '动力元件', '执行元件', '控制元件', '负载']
            },
            {
                id: 2,
                type: 'fill',
                text: '齿轮泵的泄漏途径有（ ）、（ ）和（ ）。',
                answers: ['齿轮齿面啮合处间隙', '泵体内孔和齿顶圆间的径向间隙', '齿轮两面和端盖间的端面间隙']
            },
            {
                id: 3,
                type: 'fill',
                text: '液压泵与油箱安装位置的不同有（ ）、（ ）和（ ）三种。',
                answers: ['上置式', '下置式', '旁置式']
            },
            {
                id: 4,
                type: 'fill',
                text: '液压控制阀按用途不同，可分为方向控制阀、（ ）、（ ）三大类。',
                answers: ['压力控制阀', '流量控制阀']
            },
            {
                id: 5,
                type: 'fill',
                text: '粘度的三种表示方法分别为：（ ）、（ ）和动力粘度。',
                answers: ['运动粘度', '相对粘度']
            },
            {
                id: 6,
                type: 'fill',
                text: '压力继电器是一种能将（ ）转换为（ ）的转换装置。',
                answers: ['液压信号', '电信号']
            },
            {
                id: 7,
                type: 'fill',
                text: '液压系统压力损失分为（ ）压力损失和（ ）压力损失。',
                answers: ['沿程', '局部']
            },
            {
                id: 8,
                type: 'fill',
                text: '液压泵的总效率等于（ ）和（ ）的乘积。',
                answers: ['容积效率', '机械效率']
            },
            {
                id: 9,
                type: 'fill',
                text: '齿轮泵主要存在着（ ）、径向力不平衡、（ ）等三大问题。',
                answers: ['困油与卸荷', '端面泄露及端面间隔自动补偿']
            },
            {
                id: 10,
                type: 'fill',
                text: '调速回路可分为（ ）、（ ）和容积节流调速回路三类。',
                answers: ['节流调速回路', '容积调速回路']
            },
            {
                id: 11,
                type: 'fill',
                text: '轴向柱塞泵是通过改变（ ）实现变量的，单作用式叶片泵是通过改变（ ）实现变量的。',
                answers: ['斜盘倾角', '偏心距']
            },
            {
                id: 12,
                type: 'fill',
                text: '活塞或工作台的运动速度取决于单位时间通过节流阀进入液压缸中油液的流量越大，系统的速度（ ），反之亦然。流量为零，系统速度（ ）。',
                answers: ['越快', '为零']
            },
            {
                id: 13,
                type: 'fill',
                text: '叶片泵按照排量是否可变，分为（ ）和（ ），一般需要（ ）来分配油液。',
                answers: ['定量叶片泵', '变量叶片泵', '配流盘']
            },
            {
                id: 14,
                type: 'fill',
                text: '液压泵的卸荷有（ ）卸荷和（ ）卸荷两种方式。',
                answers: ['压力', '流量']
            },
            {
                id: 15,
                type: 'fill',
                text: '液体的流动状态分为（ ）和（ ）。',
                answers: ['层流', '紊流']
            },
            {
                id: 16,
                type: 'fill',
                text: '由于流体具有（ ），液流在管道中流动需要损耗一部分能量，它由（ ）损失和（ ）损失两部分组成。',
                answers: ['黏性', '沿程压力', '局部压力']
            },
            {
                id: 17,
                type: 'fill',
                text: '速度控制回路是对液压系统中执行元件的（ ）和（ ）实现控制的回路。常用的速度控制回路有（ ）、（ ）、快速回路。',
                answers: ['运动速度', '速度切换', '调速回路', '速度换接回路']
            },
            {

        let currentQuestion = 0;
        let userAnswers = [];
        let isAnswered = false;
        let score = 0;
        let isShuffled = false;
        let shuffledQuestions = [];

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getCurrentQuestions() {
            if (isShuffled) {
                if (shuffledQuestions.length === 0) {
                    const fillQuestions = questions.filter(q => q.type === 'fill');
                    const choiceQuestions = questions.filter(q => q.type === 'choice');
                    const truefalseQuestions = questions.filter(q => q.type === 'truefalse');
                    shuffledQuestions = [
                        ...shuffleArray(fillQuestions),
                        ...shuffleArray(choiceQuestions),
                        ...shuffleArray(truefalseQuestions)
                    ];
                }
                return shuffledQuestions;
            }
            return questions;
        }

        function toggleShuffleMode() {
            isShuffled = document.getElementById('shuffleMode').checked;
            shuffledQuestions = [];
            initQuiz();
        }

        function initQuiz() {
            const currentQs = getCurrentQuestions();
            userAnswers = new Array(currentQs.length).fill(null);
            currentQuestion = 0;
            score = 0;
            isAnswered = false;
            renderQuestion();
            renderQuestionGrid();
            updateProgress();
        }

        function renderQuestion() {
            const currentQs = getCurrentQuestions();
            const question = currentQs[currentQuestion];
            const content = document.getElementById('questionContent');
            
            document.getElementById('questionNumber').textContent = `题目 ${question.id}`;
            
            let typeLabel, typeClass;
            if (question.type === 'fill') {
                typeLabel = '填空题';
                typeClass = 'fill';
            } else if (question.type === 'truefalse') {
                typeLabel = '判断题';
                typeClass = 'truefalse';
            } else {
                typeLabel = '选择题';
                typeClass = 'choice';
            }
            
            let html = `<div class="question-text">${question.text}<span class="question-type ${typeClass}">${typeLabel}</span></div>`;
            
            if (question.type === 'fill') {
                html += '<div class="blanks">';
                question.answers.forEach((_, index) => {
                    const userAnswer = userAnswers[currentQuestion] && userAnswers[currentQuestion][index] !== undefined ? userAnswers[currentQuestion][index] : '';
                    const isCorrect = isAnswered ? checkFillAnswer(index, userAnswer) : null;
                    const correctAnswer = isAnswered ? question.answers[index] : '';
                    
                    html += `
                        <div class="blank-item">
                            <span class="blank-label">第${index + 1}空:</span>
                            <input type="text" 
                                class="answer-input ${isCorrect !== null ? (isCorrect ? 'correct' : 'incorrect') : ''}" 
                                id="answer${index}"
                                value="${userAnswer}"
                                ${isAnswered ? 'disabled' : ''}
                                oninput="saveFillAnswer(${index}, this.value)"
                                placeholder="请输入答案"
                            />
                            <div class="correct-answer ${isAnswered ? 'show' : ''}" id="correct${index}">
                                ✅ 正确答案: ${correctAnswer}
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            } else if (question.type === 'truefalse') {
                html += '<div class="options">';
                const options = [{ letter: '√', text: '正确' }, { letter: '×', text: '错误' }];
                options.forEach((option) => {
                    const userChoice = userAnswers[currentQuestion];
                    const isSelected = userChoice === option.letter;
                    const isCorrect = isAnswered ? option.letter === question.answer : null;
                    
                    let optionClass = 'option-item';
                    if (isAnswered) {
                        if (option.letter === question.answer) {
                            optionClass += ' correct';
                        } else if (isSelected && option.letter !== question.answer) {
                            optionClass += ' incorrect';
                        }
                    } else if (isSelected) {
                        optionClass += ' selected';
                    }
                    
                    html += `
                        <div class="${optionClass}" 
                             ${isAnswered ? 'disabled' : ''}
                             onclick="${isAnswered ? '' : `selectOption('${option.letter}')`}">
                            <div class="option-letter">${option.letter}</div>
                            <div class="option-text">${option.text}</div>
                        </div>
                    `;
                });
                html += '</div>';
            } else {
                if (question.image) {
                    if (question.image.startsWith('<svg')) {
                        html += `<div class="question-image">${question.image}</div>`;
                    } else {
                        html += `<img src="${question.image}" alt="题目图片" class="question-image" />`;
                    }
                }
                html += '<div class="options">';
                question.options.forEach((option, index) => {
                    const userChoice = userAnswers[currentQuestion];
                    const isSelected = userChoice === option.letter;
                    const isCorrect = isAnswered ? option.letter === question.answer : null;
                    
                    let optionClass = 'option-item';
                    if (isAnswered) {
                        if (option.letter === question.answer) {
                            optionClass += ' correct';
                        } else if (isSelected && option.letter !== question.answer) {
                            optionClass += ' incorrect';
                        }
                    } else if (isSelected) {
                        optionClass += ' selected';
                    }
                    
                    let optionContent = '';
                    if (question.imageOptions && option.image) {
                        if (option.image.startsWith('<svg')) {
                            optionContent = `
                                <div class="option-letter">${option.letter}</div>
                                <div class="option-image">${option.image}</div>
                                <div class="option-text">${option.text}</div>
                            `;
                        } else {
                            optionContent = `
                                <div class="option-letter">${option.letter}</div>
                                <img src="${option.image}" alt="选项${option.letter}" class="option-image" />
                                <div class="option-text">${option.text}</div>
                            `;
                        }
                    } else {
                        optionContent = `
                            <div class="option-letter">${option.letter}</div>
                            <div class="option-text">${option.text}</div>
                        `;
                    }
                    
                    html += `
                        <div class="${optionClass}" 
                             ${isAnswered ? 'disabled' : ''}
                             onclick="${isAnswered ? '' : `selectOption('${option.letter}')`}">
                            ${optionContent}
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            content.innerHTML = html;
            updateNavButtons();
        }

        function saveFillAnswer(index, value) {
            if (!userAnswers[currentQuestion]) {
                userAnswers[currentQuestion] = [];
            }
            userAnswers[currentQuestion][index] = value.trim();
            isAnswered = false;
        }

        function selectOption(letter) {
            userAnswers[currentQuestion] = letter;
            isAnswered = false;
            renderQuestion();
        }

        function checkFillAnswer(index, userAnswer) {
            const currentQs = getCurrentQuestions();
            const question = currentQs[currentQuestion];
            const correctAnswer = question.answers[index];
            return userAnswer === correctAnswer;
        }

        function submitAnswer() {
            isAnswered = true;
            const currentQs = getCurrentQuestions();
            const question = currentQs[currentQuestion];
            
            if (question.type === 'fill') {
                let correctCount = 0;
                question.answers.forEach((_, index) => {
                    const userAnswer = userAnswers[currentQuestion] && userAnswers[currentQuestion][index] !== undefined ? userAnswers[currentQuestion][index] : '';
                    const isCorrect = checkFillAnswer(index, userAnswer);
                    const input = document.getElementById(`answer${index}`);
                    const correctDiv = document.getElementById(`correct${index}`);
                    
                    if (input) {
                        input.classList.remove('correct', 'incorrect');
                        input.classList.add(isCorrect ? 'correct' : 'incorrect');
                        input.disabled = true;
                    }
                    
                    if (correctDiv) {
                        if (!isCorrect) {
                            correctDiv.classList.add('show');
                        } else {
                            correctCount++;
                        }
                    }
                });
                if (correctCount === question.answers.length) {
                    score++;
                }
            } else {
                const isCorrect = userAnswers[currentQuestion] === question.answer;
                if (isCorrect) {
                    score++;
                }
                renderQuestion();
            }
            
            document.getElementById('currentScore').textContent = score;
            renderQuestionGrid();
            updateNavButtons();
        }

        function nextQuestion() {
            const currentQs = getCurrentQuestions();
            if (!isAnswered) {
                submitAnswer();
                return;
            }
            
            if (currentQuestion < currentQs.length - 1) {
                currentQuestion++;
                isAnswered = userAnswers[currentQuestion] !== null;
                renderQuestion();
                updateProgress();
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                isAnswered = userAnswers[currentQuestion] !== null;
                renderQuestion();
                updateProgress();
            }
        }

        function updateNavButtons() {
            const currentQs = getCurrentQuestions();
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentQuestion === 0;
            
            if (isAnswered) {
                nextBtn.textContent = currentQuestion < currentQs.length - 1 ? '下一题' : '查看结果';
            } else {
                nextBtn.textContent = '提交答案';
            }
        }

        function updateProgress() {
            const currentQs = getCurrentQuestions();
            const progress = ((currentQuestion + 1) / currentQs.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = `${currentQuestion + 1}/${currentQs.length}`;
        }

        function renderQuestionGrid() {
            const currentQs = getCurrentQuestions();
            const grid = document.getElementById('questionGrid');
            let html = '';
            
            currentQs.forEach((_, index) => {
                let className = 'question-num pending';
                
                if (index === currentQuestion) {
                    className = 'question-num current';
                } else if (userAnswers[index] !== null) {
                    className = 'question-num completed';
                }
                
                html += `<div class="${className}" onclick="goToQuestion(${index})">${index + 1}</div>`;
            });
            
            grid.innerHTML = html;
        }

        function goToQuestion(index) {
            if (index !== currentQuestion) {
                currentQuestion = index;
                isAnswered = userAnswers[currentQuestion] !== null;
                renderQuestion();
                renderQuestionGrid();
                updateProgress();
            }
        }

        function showResult() {
            const currentQs = getCurrentQuestions();
            const modal = document.getElementById('resultModal');
            const finalScore = document.getElementById('finalScore');
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const correctCount = document.getElementById('correctCount');
            const incorrectCount = document.getElementById('incorrectCount');
            const skippedCount = document.getElementById('skippedCount');
            
            finalScore.textContent = `${score}分`;
            
            let correct = 0;
            let incorrect = 0;
            let skipped = 0;
            
            userAnswers.forEach((answer, index) => {
                const question = currentQs[index];
                if (answer === null) {
                    skipped++;
                } else {
                    let isCorrect = false;
                    if (question.type === 'fill') {
                        isCorrect = question.answers.every((ans, i) => answer[i] === ans);
                    } else {
                        isCorrect = answer === question.answer;
                    }
                    if (isCorrect) {
                        correct++;
                    } else {
                        incorrect++;
                    }
                }
            });
            
            correctCount.textContent = correct;
            incorrectCount.textContent = incorrect;
            skippedCount.textContent = skipped;
            
            const percentage = (score / questions.length) * 100;
            if (percentage >= 90) {
                resultIcon.className = 'result-icon excellent';
                resultIcon.textContent = '🏆';
                resultTitle.textContent = '太棒了！';
            } else if (percentage >= 70) {
                resultIcon.className = 'result-icon good';
                resultIcon.textContent = '👍';
                resultTitle.textContent = '表现不错！';
            } else if (percentage >= 60) {
                resultIcon.className = 'result-icon pass';
                resultIcon.textContent = '💪';
                resultTitle.textContent = '及格了！';
            } else {
                resultIcon.className = 'result-icon fail';
                resultIcon.textContent = '📚';
                resultTitle.textContent = '继续加油！';
            }
            
            modal.classList.add('show');
        }

        function restartQuiz() {
            document.getElementById('resultModal').classList.remove('show');
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
